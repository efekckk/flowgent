name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Test
        env:
          FLOWGENT_TEST_DATABASE_URL: postgres://postgres:secret@localhost:5432/postgres?sslmode=disable
        run: go test ./... -race -cover -coverprofile=coverage.out

      - name: Build
        run: go build -o /tmp/flowgent ./cmd/flowgent

      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -20
